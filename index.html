<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>

<a-scene vr-mode-ui="enabled: true">

<a-entity camera look-controls position="0 1.6 3"></a-entity>

<a-box position="-1 1 -3" color="green"
       onclick="send('F')"></a-box>

<a-box position="1 1 -3" color="blue"
       onclick="send('B')"></a-box>

<a-box position="-1 0 -3" color="yellow"
       onclick="send('L')"></a-box>

<a-box position="1 0 -3" color="orange"
       onclick="send('R')"></a-box>

<a-box position="0 -1 -3" color="red"
       onclick="send('S')"></a-box>

</a-scene>

<script>
let characteristic;

async function connect() {
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ name: 'ESP32_ROBOT' }],
    optionalServices: ['1234']
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService('1234');
  characteristic = await service.getCharacteristic('5678');
}

function send(cmd) {
  if (!characteristic) return;
  const encoder = new TextEncoder();
  characteristic.writeValue(encoder.encode(cmd));
}
</script>

</body>
</html>
